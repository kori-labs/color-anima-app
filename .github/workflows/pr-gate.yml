name: PR Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  external-pr-policy:
    name: external-pr-policy
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Explain external contribution policy
        run: |
          echo "External pull requests are not accepted for this pre-release repository."
          echo "Maintainers will triage public issues instead."

  pr-macos-gate:
    name: pr-macos-gate
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS, arm64, mac-studio]
    timeout-minutes: 30
    env:
      COLOR_ANIMA_PERF_TRACE: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Design token gate
        run: sh scripts/scan-design-token-violations.sh

      - name: Select Xcode (Swift 6.x toolchain)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Lint package manifest
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          manifest = Path("Package.swift").read_text()

          for match in re.finditer(
              r'\.binaryTarget\s*\(\s*name\s*:\s*"ColorAnimaKernel"(?P<body>.*?)\)',
              manifest,
              flags=re.S,
          ):
              if re.search(r"\bpath\s*:\s*\"", match.group("body")):
                  line = manifest.count("\n", 0, match.start()) + 1
                  print(
                      f"::error file=Package.swift,line={line}::Hard-coded local .binaryTarget(path:) override detected. Use COLOR_ANIMA_KERNEL_PATH instead."
                  )
                  sys.exit(1)
          PY
          echo "lint: manifest is public-shell clean"

      - name: Resolve packages
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test XCTest
        run: |
          python3 - <<'PY'
          import os
          import signal
          import subprocess
          import sys
          import time

          test_env = os.environ.copy()
          test_env.pop("COLOR_ANIMA_PERF_TRACE", None)

          def run_with_timeout(args, timeout_seconds):
              process = subprocess.Popen(args, start_new_session=True, env=test_env)
              try:
                  return process.wait(timeout=timeout_seconds)
              except subprocess.TimeoutExpired:
                  print(
                      f"::error::Timed out after {timeout_seconds}s: {' '.join(args)}",
                      flush=True,
                  )
                  os.killpg(process.pid, signal.SIGTERM)
                  try:
                      process.wait(timeout=10)
                  except subprocess.TimeoutExpired:
                      os.killpg(process.pid, signal.SIGKILL)
                      process.wait()
                  return 124

          listed = subprocess.run(
              [
                  "swift",
                  "test",
                  "list",
                  "--disable-swift-testing",
                  "--skip",
                  "testCapture",
              ],
              capture_output=True,
              text=True,
              check=True,
              env=test_env,
          )
          sys.stdout.write(listed.stdout)
          sys.stderr.write(listed.stderr)

          filters = sorted({
              line.split("/", 1)[0]
              for line in listed.stdout.splitlines()
              if line.startswith("ColorAnima") and "/testCapture" not in line
          })

          print(f"xctest-suite-count={len(filters)}", flush=True)
          for test_filter in filters:
              print(f"::group::{test_filter}", flush=True)
              started = time.monotonic()
              status = run_with_timeout(
                  [
                      "swift",
                      "test",
                      "--disable-swift-testing",
                      "--no-parallel",
                      "--skip",
                      "testCapture",
                      "--filter",
                      test_filter,
                  ],
                  timeout_seconds=180,
              )
              elapsed = time.monotonic() - started
              print(f"::endgroup::", flush=True)
              if status != 0:
                  print(
                      f"::error::XCTest suite failed: {test_filter} ({elapsed:.1f}s)",
                      flush=True,
                  )
                  sys.exit(status)
              print(f"passed {test_filter} ({elapsed:.1f}s)", flush=True)
          PY

      - name: Test Swift Testing
        run: |
          python3 - <<'PY'
          import os
          import signal
          import subprocess
          import sys
          import time

          test_env = os.environ.copy()
          test_env.pop("COLOR_ANIMA_PERF_TRACE", None)

          def run_with_timeout(args, timeout_seconds):
              process = subprocess.Popen(args, start_new_session=True, env=test_env)
              try:
                  return process.wait(timeout=timeout_seconds)
              except subprocess.TimeoutExpired:
                  print(
                      f"::error::Timed out after {timeout_seconds}s: {' '.join(args)}",
                      flush=True,
                  )
                  os.killpg(process.pid, signal.SIGTERM)
                  try:
                      process.wait(timeout=10)
                  except subprocess.TimeoutExpired:
                      os.killpg(process.pid, signal.SIGKILL)
                      process.wait()
                  return 124

          listed = subprocess.run(
              ["swift", "test", "list", "--disable-xctest"],
              capture_output=True,
              text=True,
              check=True,
              env=test_env,
          )
          sys.stdout.write(listed.stdout)
          sys.stderr.write(listed.stderr)

          filters = sorted({
              line.split("/", 1)[0]
              for line in listed.stdout.splitlines()
              if line.startswith("ColorAnima")
          })

          print(f"swift-testing-suite-count={len(filters)}", flush=True)
          for test_filter in filters:
              print(f"::group::{test_filter}", flush=True)
              started = time.monotonic()
              status = run_with_timeout(
                  [
                      "swift",
                      "test",
                      "--disable-xctest",
                      "--no-parallel",
                      "--filter",
                      test_filter,
                  ],
                  timeout_seconds=180,
              )
              elapsed = time.monotonic() - started
              print(f"::endgroup::", flush=True)
              if status != 0:
                  print(
                      f"::error::Swift Testing suite failed: {test_filter} ({elapsed:.1f}s)",
                      flush=True,
                  )
                  sys.exit(status)
              print(f"passed {test_filter} ({elapsed:.1f}s)", flush=True)
          PY

  core-intake:
    name: core-intake
    runs-on: [self-hosted, macOS, arm64, mac-studio]
    if: github.event_name == 'push'
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - uses: actions/checkout@v4

      - name: Fetch encrypted kernel binary
        env:
          GH_TOKEN: ${{ github.token }}
          COLOR_ANIMA_KERNEL_DECRYPTION_KEY: ${{ secrets.COLOR_ANIMA_KERNEL_DECRYPTION_KEY }}
        run: |
          if [ ! -f CoreBinary.env ]; then
            echo "CoreBinary.env is absent in this checkout; skipping encrypted core intake."
            exit 0
          fi
          ./scripts/fetch-core-binary.sh

      - name: Verify encrypted kernel intake
        if: hashFiles('CoreBinary.env') != ''
        run: |
          COLOR_ANIMA_KERNEL_PATH=".local-core/ColorAnimaKernel.xcframework" \
            ./scripts/verify-core-binary-intake.sh
