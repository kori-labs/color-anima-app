name: Bug report
description: Report a reproducible issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the issue in a few sentences.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: macOS version, hardware, and app version if available.
    validations:
      required: false
  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      description: Do not attach sensitive files or customer material.
    validations:
      required: false
