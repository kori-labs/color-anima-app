name: Feature request
description: Suggest a workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Workflow problem
      description: What task or workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Requested behavior
      description: What would you like Color Anima to support?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any non-sensitive context that helps explain the request.
    validations:
      required: false
